<!DOCTYPE html>
<html>
<head>
    <title>Online Shopping</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f2f2f2;
            margin:0;
        }

        header{
            background:#2c3e50;
            color:white;
            padding:20px;
            text-align:center;
        }

        .container{
            display:flex;
            justify-content:center;
            gap:20px;
            margin-top:40px;
        }

        .card{
            background:white;
            width:220px;
            padding:20px;
            border-radius:10px;
            text-align:center;
            box-shadow:0 0 10px gray;
        }

        .product{
            font-size:70px;
        }

        h2{
            margin:10px 0;
        }

        p{
            color:green;
            font-size:20px;
            font-weight:bold;
        }

        button{
            background:green;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:darkgreen;
        }

        footer{
            margin-top:40px;
            background:#2c3e50;
            color:white;
            text-align:center;
            padding:15px;
        }
    </style>
</head>

<body>

<header>
    <h1>🛍 Online Shopping Store</h1>
</header>

<div class="container">

    <div class="card">
        <div class="product">⌚</div>
        <h2>Watch</h2>
        <p>₹2,999</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <div class="product">💍</div>
        <h2>Ring</h2>
        <p>₹1,499</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <div class="product">📿</div>
        <h2>Chain</h2>
        <p>₹3,999</p>
        <button>Add to Cart</button>
    </div>

</div>

<footer>
    <h3>© 2026 Online Shopping Store</h3>
</footer>

</body>
</html>
